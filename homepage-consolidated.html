<style>
:root{--dark:#1a3c34;--dark-card:#234d42;--dark-deep:#0f2820;--mint:#d4f5e4;--mint-pale:#edfbf3;--accent:#0fbcb0;--accent-hover:#0da399;--accent-glow:rgba(15,188,176,0.25);--white:#fff;--off-white:#fafcfb;--text-1:rgba(26,60,52,1);--text-2:rgba(26,60,52,0.78);--text-3:rgba(26,60,52,0.6);--text-4:rgba(26,60,52,0.45);--text-on-dark-1:rgba(255,255,255,1);--text-on-dark-2:rgba(255,255,255,0.78);--text-on-dark-3:rgba(255,255,255,0.58);--text-on-dark-4:rgba(255,255,255,0.4);--radius-card:24px;--radius-lg:32px;--radius-pill:50px;--shadow-sm:0 2px 12px rgba(26,60,52,0.06);--shadow-card:0 4px 24px rgba(26,60,52,0.08);--shadow-card-hover:0 12px 40px rgba(26,60,52,0.14);--shadow-deep:0 20px 60px rgba(26,60,52,0.18);--ease:cubic-bezier(.19,1,.22,1);--ease-out:cubic-bezier(.33,1,.68,1);--dur-reveal:0.9s;--dur-fast:0.4s;--font:'Cabin','DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--max-width:1200px;--section-pad:clamp(4rem,8vw,7rem);--section-pad-x:clamp(1.25rem,4vw,3rem)}

/* FOUC prevention */

.ldc-hp-skip{position:absolute;top:-100%;left:0;z-index:9999;padding:12px 24px;background:var(--accent);color:var(--white);font-weight:600;border-radius:0 0 var(--radius-card) 0}

@media(max-width:900px){.ldc-hp-hero-split{flex-direction:column;text-align:center;padding-top:clamp(5rem,10vh,8rem);padding-bottom:2rem}.ldc-hp-hero-content{text-align:center;max-width:100%}.ldc-hp-hero-sub{margin-left:auto;margin-right:auto}.ldc-hp-hero-ctas{justify-content:center}.ldc-hp-hero-team{max-width:400px;margin-bottom:-3rem}}

@media(max-width:1024px){.ldc-hp-flipcards-grid{grid-template-columns:repeat(3,1fr);gap:1.5rem}.ldc-hp-flipcard{width:150px;height:150px}}

  // Inject body content into page
  function injectPage() {
    document.body.classList.add('homepage');
    var target = document.querySelector('main') || document.querySelector('#page') || document.body;
    var wrapper = document.createElement('div');
    wrapper.innerHTML = html;
    if(wrapper.firstElementChild) {
      target.insertBefore(wrapper.firstElementChild, target.firstChild);
    }
    // Run animations after injection
    initAnimations();
  }

  // Animations (from homepage-injection-single.html)
  function initAnimations() {

  function revealPage(){var r=document.querySelector('.ldc-hp');if(r)r.classList.add('ldc-hp-ready')}

  function initScrollReveal(){
    var els=document.querySelectorAll('.ldc-hp-reveal,.ldc-hp-reveal-scale,.ldc-hp-reveal-left,.ldc-hp-reveal-right,.ldc-hp-reveal-stagger');
    if(!els.length)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target)}})
    },{threshold:.12,rootMargin:'0px 0px -60px 0px'});
    els.forEach(function(el){obs.observe(el)});
  }

  function initBlobAnimations(){
    var heroBlobs=document.querySelectorAll('.ldc-hp-blob--hero-1,.ldc-hp-blob--hero-2,.ldc-hp-blob--hero-3');
    heroBlobs.forEach(function(blob,i){setTimeout(function(){blob.classList.add('blob-visible')},300+(i*200))});
    var scrollBlobs=document.querySelectorAll('.ldc-hp-blob:not([class*="hero"])');
    if(!scrollBlobs.length)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('blob-visible');obs.unobserve(e.target)}})
    },{threshold:.05,rootMargin:'100px 0px 0px 0px'});
    scrollBlobs.forEach(function(el){obs.observe(el)});
  }

  function initCardGrow(){
    var cards=document.querySelectorAll('.ldc-hp-service-card,.ldc-hp-step,.ldc-hp-team-card,.ldc-hp-review-card,.ldc-hp-trust-item,.ldc-hp-faq-item,.ldc-hp-flipcard');
    if(!cards.length)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          var parent=entry.target.parentElement;
          var siblings=parent?Array.prototype.slice.call(parent.children):[];
          var index=siblings.indexOf(entry.target);
          var delay=Math.min(index*100,600);
          setTimeout(function(){entry.target.classList.add('card-grown')},delay);
          obs.unobserve(entry.target);
        }
      })
    },{threshold:.08,rootMargin:'0px 0px -40px 0px'});
    cards.forEach(function(el){obs.observe(el)});
  }

  function initBlobParallax(){
    var blobs=document.querySelectorAll('.ldc-hp-blob');
    if(!blobs.length||window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
    var ticking=false;
    function onScroll(){
      if(!ticking){requestAnimationFrame(function(){
        var scrollY=window.pageYOffset;
        blobs.forEach(function(blob){
          var rect=blob.getBoundingClientRect();
          if(rect.top<window.innerHeight&&rect.bottom>0){
            var speed=blob.classList.contains('ldc-hp-blob--hero-1')?0.03:blob.classList.contains('ldc-hp-blob--hero-2')?-0.02:0.015;
            var y=scrollY*speed;
            blob.style.transform=blob.classList.contains('blob-visible')?'scale(1) translateY('+y+'px)':'';
          }
        });
        ticking=false;
      });ticking=true;}
    }
    window.addEventListener('scroll',onScroll,{passive:true});
  }

  function animateCounter(el){
    var target=parseFloat(el.getAttribute('data-count-to'));
    var prefix=el.getAttribute('data-count-prefix')||'';
    var suffix=el.getAttribute('data-count-suffix')||'';
    var dec=el.getAttribute('data-count-decimal')?parseInt(el.getAttribute('data-count-decimal'),10):0;
    var dur=2000,start=null;
    function step(ts){
      if(!start)start=ts;var p=Math.min((ts-start)/dur,1);var eased=1-Math.pow(1-p,3);var cur=eased*target;
      el.textContent=dec>0?prefix+cur.toFixed(dec)+suffix:prefix+Math.floor(cur).toLocaleString()+suffix;
      if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function initCounters(){
    var ctrs=document.querySelectorAll('[data-count-to]');if(!ctrs.length)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){animateCounter(e.target);obs.unobserve(e.target)}})
    },{threshold:.5});
    ctrs.forEach(function(el){obs.observe(el)});
  }

  function initFAQ(){
    var items=document.querySelectorAll('.ldc-hp-faq-item');if(!items.length)return;
    items.forEach(function(item){
      var btn=item.querySelector('.ldc-hp-faq-q');if(!btn)return;
      btn.addEventListener('click',function(){
        var isOpen=item.classList.contains('open');
        items.forEach(function(o){if(o!==item)o.classList.remove('open')});
        item.classList.toggle('open',!isOpen);
      });
    });
  }

  function initReviewCarousel(){
    var scroll=document.querySelector('.ldc-hp-reviews-scroll');
    var dots=document.querySelectorAll('.ldc-hp-review-dot');
    if(!scroll||!dots.length)return;
    var cards=scroll.querySelectorAll('.ldc-hp-review-card');
    dots.forEach(function(dot,i){dot.addEventListener('click',function(){if(cards[i])cards[i].scrollIntoView({behavior:'smooth',inline:'start',block:'nearest'})})});
    var t;
    scroll.addEventListener('scroll',function(){clearTimeout(t);t=setTimeout(function(){var w=cards[0]?cards[0].offsetWidth+20:340;var idx=Math.round(scroll.scrollLeft/w);dots.forEach(function(d,j){d.classList.toggle('active',j===idx)})},50)},{passive:true});
  }

  function initSmoothScroll(){
    document.querySelectorAll('.ldc-hp a[href^="#"]').forEach(function(link){
      link.addEventListener('click',function(e){var id=link.getAttribute('href');if(id==='#')return;var tgt=document.querySelector(id);if(tgt){e.preventDefault();tgt.scrollIntoView({behavior:'smooth',block:'start'})}});
    });
  }

  function init(){revealPage();initScrollReveal();initBlobAnimations();initCardGrow();initBlobParallax();initCounters();initFAQ();initReviewCarousel();initSmoothScroll()}

    init();
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', injectPage);
  else injectPage();
})();
</script>
