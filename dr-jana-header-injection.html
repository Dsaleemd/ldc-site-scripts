<!-- Dr Jana Page — Paste into Page Settings > Advanced > Page Header Code Injection -->
<style>
  .dj-page *, .dj-page *::before, .dj-page *::after { box-sizing: border-box; margin: 0; padding: 0; }
  .dj-page {
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #1a1a1a;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .dj-page img { max-width: 100%; height: auto; display: block; }
  .dj-page a { text-decoration: none; color: inherit; }

  .dj-container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
  .dj-section { padding: 80px 0; }
  .dj-section--alt { background: #f8fafa; }
  .dj-section--dark { background: #0a2b2a; color: #fff; }
  .dj-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #0fbcb0;
    margin-bottom: 12px;
  }
  .dj-section--dark .dj-tag { color: #5ee8dc; }
  .dj-h2 {
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .dj-h3 {
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 12px;
  }
  .dj-body { font-size: 16px; color: #555; line-height: 1.7; }
  .dj-section--dark .dj-body { color: #b8d4d2; }

  .dj-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
    text-align: center;
  }
  .dj-btn:active { transform: scale(0.97); }
  .dj-btn--primary {
    background: #0fbcb0;
    color: #fff;
    padding: 16px 36px;
    box-shadow: 0 4px 16px rgba(15, 188, 176, 0.3);
  }
  .dj-btn--primary:hover { background: #0da399; box-shadow: 0 6px 24px rgba(15, 188, 176, 0.4); }
  .dj-btn--outline {
    background: transparent;
    color: #0fbcb0;
    padding: 14px 32px;
    border: 2px solid #0fbcb0;
  }
  .dj-btn--outline:hover { background: #0fbcb0; color: #fff; }
  .dj-btn--white {
    background: #fff;
    color: #0a2b2a;
    padding: 16px 36px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .dj-btn--white:hover { background: #f0fffe; box-shadow: 0 6px 24px rgba(0,0,0,0.15); }

  .dj-hero {
    position: relative;
    min-height: 92vh;
    display: flex;
    align-items: center;
    background: linear-gradient(135deg, #0a2b2a 0%, #0e3d3a 50%, #0a2b2a 100%);
    overflow: hidden;
    padding: 100px 0 80px;
  }
  .dj-hero__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }
  .dj-hero__content { position: relative; z-index: 2; }
  .dj-hero__badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(15, 188, 176, 0.15);
    border: 1px solid rgba(15, 188, 176, 0.3);
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    color: #5ee8dc;
    margin-bottom: 24px;
  }
  .dj-hero__badge svg { flex-shrink: 0; }
  .dj-hero__title {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 700;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 20px;
  }
  .dj-hero__title span { color: #0fbcb0; }
  .dj-hero__sub {
    font-size: 17px;
    color: #9ac5c2;
    margin-bottom: 32px;
    max-width: 480px;
  }
  .dj-hero__creds {
    list-style: none;
    margin-bottom: 36px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .dj-hero__creds li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #c5e0de;
  }
  .dj-hero__creds li svg { flex-shrink: 0; color: #0fbcb0; }
  .dj-hero__ctas { display: flex; gap: 12px; flex-wrap: wrap; }
  .dj-hero__img-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
  }
  .dj-hero__img-wrap img {
    width: 100%;
    max-width: 520px;
    border-radius: 20px;
    object-fit: cover;
  }
  .dj-hero__img-glow {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(15,188,176,0.2) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: -1;
    pointer-events: none;
  }

  .dj-logos { padding: 40px 0; background: #fff; border-bottom: 1px solid #eee; }
  .dj-logos__label { font-size: 12px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; margin-bottom: 24px; }
  .dj-logos__row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
  }
  .dj-logos__row img {
    height: 32px;
    width: auto;
    object-fit: contain;
    filter: grayscale(1) opacity(0.5);
    transition: filter 0.3s ease;
  }
  .dj-logos__row img:hover { filter: grayscale(0) opacity(1); }

  .dj-about__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }
  .dj-about__img {
    border-radius: 16px;
    object-fit: cover;
    width: 100%;
    aspect-ratio: 4/5;
  }
  .dj-about__highlights {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin: 24px 0 32px;
  }
  .dj-about__highlights li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 15px;
    color: #333;
  }
  .dj-about__highlights li svg { flex-shrink: 0; margin-top: 3px; color: #0fbcb0; }

  .dj-gallery__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin: 40px 0;
  }
  .dj-gallery__item {
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 4/3;
    position: relative;
  }
  .dj-gallery__item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }
  .dj-gallery__item:hover img { transform: scale(1.05); }
  .dj-gallery__center { text-align: center; }

  .dj-process__header { text-align: center; max-width: 600px; margin: 0 auto 56px; }
  .dj-process__steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }
  .dj-process__step {
    text-align: center;
    padding: 40px 28px;
    background: rgba(15, 188, 176, 0.06);
    border-radius: 16px;
    border: 1px solid rgba(15, 188, 176, 0.12);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .dj-process__step:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(15, 188, 176, 0.1); }
  .dj-process__num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #0fbcb0;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .dj-process__step h3 { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
  .dj-process__step p { font-size: 14px; color: #666; line-height: 1.7; }

  .dj-pricing__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin: 48px 0 40px;
  }
  .dj-card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e8e8e8;
    padding: 32px 28px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
  }
  .dj-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.08); }
  .dj-card--featured {
    border-color: #0fbcb0;
    box-shadow: 0 8px 32px rgba(15, 188, 176, 0.15);
    position: relative;
    overflow: hidden;
  }
  .dj-card__badge {
    position: absolute;
    top: 16px;
    right: -30px;
    background: #0fbcb0;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 40px;
    transform: rotate(45deg);
    letter-spacing: 0.5px;
  }
  .dj-card__name { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #0fbcb0; margin-bottom: 8px; }
  .dj-card__title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .dj-card__teeth { font-size: 14px; color: #888; margin-bottom: 20px; }
  .dj-card__price { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .dj-card__price-main { font-size: 28px; font-weight: 700; color: #0a2b2a; }
  .dj-card__price-period { font-size: 14px; color: #888; }
  .dj-card__price-original { font-size: 14px; color: #aaa; text-decoration: line-through; margin-bottom: 16px; }
  .dj-card__divider { height: 1px; background: #eee; margin: 16px 0; }
  .dj-card__features { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; flex-grow: 1; }
  .dj-card__features li { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #555; }
  .dj-card__features li svg { flex-shrink: 0; color: #0fbcb0; }

  .dj-offer {
    background: linear-gradient(135deg, #0a2b2a 0%, #0e3d3a 100%);
    border-radius: 20px;
    padding: 48px;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 48px;
    align-items: center;
    margin-top: 48px;
  }
  .dj-offer__badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 50px;
    margin-bottom: 16px;
  }
  .dj-offer__title { font-size: clamp(24px, 3.5vw, 34px); font-weight: 700; color: #fff; margin-bottom: 8px; }
  .dj-offer__sub { font-size: 15px; color: #9ac5c2; margin-bottom: 24px; }
  .dj-offer__features { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .dj-offer__features li { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #c5e0de; }
  .dj-offer__features li svg { flex-shrink: 0; color: #5ee8dc; }
  .dj-offer__pricing { text-align: center; }
  .dj-offer__original { font-size: 18px; color: #7a9b99; text-decoration: line-through; margin-bottom: 4px; }
  .dj-offer__sale { font-size: clamp(40px, 5vw, 56px); font-weight: 700; color: #fff; margin-bottom: 4px; }
  .dj-offer__monthly { font-size: 15px; color: #5ee8dc; margin-bottom: 8px; }
  .dj-offer__finance { font-size: 12px; color: #7a9b99; margin-bottom: 24px; }
  .dj-offer__urgency {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #f87171;
    margin-top: 16px;
  }

  .dj-location__inner { text-align: center; max-width: 560px; margin: 0 auto; }
  .dj-location__address { font-size: 17px; color: #c5e0de; margin: 8px 0 8px; }
  .dj-location__stations { font-size: 14px; color: #9ac5c2; margin-bottom: 28px; }
  .dj-location__hours { display: inline-flex; flex-direction: column; gap: 4px; font-size: 14px; color: #b8d4d2; margin-bottom: 28px; }
  .dj-location__hours span { display: flex; justify-content: space-between; gap: 40px; }
  .dj-location__hours strong { color: #fff; }

  @media (max-width: 900px) {
    .dj-hero__grid { grid-template-columns: 1fr; text-align: center; }
    .dj-hero__sub { margin-left: auto; margin-right: auto; }
    .dj-hero__creds { align-items: center; }
    .dj-hero__ctas { justify-content: center; }
    .dj-hero__img-wrap { order: -1; margin-bottom: 20px; }
    .dj-hero__img-wrap img { max-width: 360px; }
    .dj-hero { min-height: auto; padding: 120px 0 60px; }
    .dj-about__grid { grid-template-columns: 1fr; }
    .dj-about__img { max-width: 400px; margin: 0 auto; }
    .dj-gallery__grid { grid-template-columns: repeat(2, 1fr); }
    .dj-process__steps { grid-template-columns: 1fr; max-width: 400px; margin: 0 auto; }
    .dj-pricing__grid { grid-template-columns: 1fr; max-width: 400px; margin: 48px auto 40px; }
    .dj-offer { grid-template-columns: 1fr; text-align: center; padding: 36px 24px; }
    .dj-offer__features { align-items: center; }
  }
  @media (max-width: 600px) {
    .dj-section { padding: 56px 0; }
    .dj-container { padding: 0 16px; }
    .dj-hero { padding: 100px 0 48px; }
    .dj-hero__img-wrap img { max-width: 280px; }
    .dj-gallery__grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .dj-logos__row { gap: 24px; }
    .dj-logos__row img { height: 24px; }
    .dj-btn--primary, .dj-btn--white, .dj-btn--outline { padding: 14px 28px; font-size: 14px; }
    .dj-offer { padding: 28px 20px; gap: 32px; }
  }

  .dj-fade-in {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .dj-fade-in.dj-visible {
    opacity: 1;
    transform: translateY(0);
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('.dj-fade-in').forEach(function(el) { el.classList.add('dj-visible'); });
    return;
  }
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('dj-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.dj-fade-in').forEach(function(el) { observer.observe(el); });
});
</script>
