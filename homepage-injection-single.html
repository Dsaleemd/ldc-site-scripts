.ldc-hp-team-card-img img{width:100%;height:100%;object-fit:cover}
.ldc-hp-team-card-body{padding:1.25rem}
.ldc-hp-team-card h3{font-size:1.05rem;margin-bottom:.25rem;color:var(--text-1)}
.ldc-hp-team-card p{font-size:.85rem;color:var(--text-4)}
@media(max-width:480px){.ldc-hp-team-card{flex:0 0 240px}}

/* Reviews */
.ldc-hp-reviews{background:var(--dark);position:relative}
.ldc-hp-reviews .ldc-hp-heading{color:var(--text-on-dark-1)}
.ldc-hp-reviews .ldc-hp-subheading{color:var(--text-on-dark-3)}
.ldc-hp-reviews-scroll{display:flex;gap:1.25rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:1rem;scrollbar-width:thin;scrollbar-color:var(--accent) transparent}
.ldc-hp-reviews-scroll::-webkit-scrollbar{height:6px}
.ldc-hp-reviews-scroll::-webkit-scrollbar-track{background:transparent}
.ldc-hp-reviews-scroll::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
.ldc-hp-review-card{flex:0 0 320px;scroll-snap-align:start;background:var(--white);border-radius:var(--radius-card);padding:1.75rem;display:flex;flex-direction:column;gap:1rem;transform:scale(.85);opacity:0;transition:transform .8s cubic-bezier(.19,1,.22,1),opacity .7s cubic-bezier(.19,1,.22,1)}
.ldc-hp-review-card.card-grown{transform:scale(1);opacity:1}
.ldc-hp-review-card .stars{color:#fbbf24;font-size:1.1rem;letter-spacing:2px}
.ldc-hp-review-card blockquote{font-size:.95rem;color:var(--text-2);line-height:1.65;flex:1;font-style:italic}
.ldc-hp-review-card .reviewer{font-size:.85rem;font-weight:600;color:var(--text-1)}
.ldc-hp-review-card .source{font-size:.8rem;color:var(--text-4)}
@media(max-width:480px){.ldc-hp-review-card{flex:0 0 280px}}

/* FAQ */
.ldc-hp-faq{background:var(--mint-pale)}
.ldc-hp-faq-list{max-width:800px;margin:0 auto}
.ldc-hp-faq-item{border-bottom:1px solid rgba(26,60,52,.08);transform:translateX(-30px);opacity:0;transition:transform .6s cubic-bezier(.19,1,.22,1),opacity .5s ease}
.ldc-hp-faq-item.card-grown{transform:translateX(0);opacity:1}
.ldc-hp-faq-item:last-child{border-bottom:none}
.ldc-hp-faq-q{width:100%;display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0;background:none;border:none;font-family:var(--font);font-size:1.05rem;font-weight:600;color:var(--text-1);cursor:pointer;text-align:left;gap:1rem;transition:color .2s ease}
.ldc-hp-faq-q:hover{color:var(--accent)}
.ldc-hp-faq-q .icon{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--dark);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:transform .4s var(--ease),background .3s ease}
.ldc-hp-faq-item.open .ldc-hp-faq-q .icon{transform:rotate(45deg);background:var(--accent)}
.ldc-hp-faq-a{max-height:0;overflow:hidden;transition:max-height .5s var(--ease),padding .3s ease}
.ldc-hp-faq-item.open .ldc-hp-faq-a{max-height:300px;padding-bottom:1.25rem}
.ldc-hp-faq-a p{font-size:.95rem;color:var(--text-3);line-height:1.7}

/* Trust items grow */
.ldc-hp-trust-item{transform:scale(.7) translateY(20px);opacity:0;transition:transform .7s cubic-bezier(.19,1,.22,1),opacity .5s ease}
.ldc-hp-trust-item.card-grown{transform:scale(1) translateY(0);opacity:1}

/* CTA */
.ldc-hp-cta{background:var(--dark);text-align:center;position:relative;overflow:hidden}
.ldc-hp-cta h2{color:var(--text-on-dark-1);font-size:clamp(2rem,4vw,3rem);margin-bottom:.75rem}
.ldc-hp-cta p{color:var(--text-on-dark-3);margin-bottom:2rem;font-size:1.1rem}
.ldc-hp-cta .ldc-hp-btn{background:var(--accent);color:var(--white);border-color:var(--accent);font-size:1.05rem;padding:1rem 2.5rem}
.ldc-hp-cta .ldc-hp-btn:hover{background:var(--accent-hover);color:var(--white);box-shadow:0 8px 32px var(--accent-glow)}
.ldc-hp-cta-blob{position:absolute;border-radius:50%;background:rgba(15,188,176,.08);pointer-events:none}
.ldc-hp-cta-blob--1{width:500px;height:500px;top:-200px;right:-150px;animation:ldc-blob-drift 18s ease-in-out infinite alternate}
.ldc-hp-cta-blob--2{width:300px;height:300px;bottom:-100px;left:-80px;animation:ldc-blob-drift 22s ease-in-out infinite alternate-reverse}

/* Blob backgrounds */
.ldc-hp-blob{position:absolute;border-radius:40% 60% 55% 45%/50% 40% 60% 50%;pointer-events:none;z-index:0;opacity:0;transform:scale(.3);transition:opacity 1.4s cubic-bezier(.19,1,.22,1),transform 1.4s cubic-bezier(.19,1,.22,1);will-change:opacity,transform}
.ldc-hp-blob.blob-visible{opacity:1;transform:scale(1)}
.ldc-hp-blob--hero-1{width:600px;height:600px;top:-120px;right:-180px;background:radial-gradient(ellipse at 30% 30%,rgba(15,188,176,.15),rgba(15,188,176,.03));border-radius:35% 65% 50% 50%/55% 40% 60% 45%;z-index:1;animation:ldc-blob-morph-1 20s ease-in-out infinite alternate}
.ldc-hp-blob--hero-2{width:400px;height:400px;bottom:80px;left:-120px;background:radial-gradient(ellipse at 60% 60%,rgba(212,245,228,.12),rgba(212,245,228,.02));border-radius:55% 45% 40% 60%/45% 55% 45% 55%;z-index:1;animation:ldc-blob-morph-2 24s ease-in-out infinite alternate}
.ldc-hp-blob--hero-3{width:250px;height:250px;top:30%;left:10%;background:radial-gradient(ellipse at 50% 50%,rgba(15,188,176,.1),transparent);border-radius:60% 40% 55% 45%/50% 60% 40% 50%;z-index:1;animation:ldc-blob-morph-3 16s ease-in-out infinite alternate}
.ldc-hp-blob--about-1{width:500px;height:500px;top:-100px;left:-200px;background:radial-gradient(ellipse at 40% 40%,rgba(15,188,176,.1),transparent);border-radius:45% 55% 60% 40%/50% 45% 55% 50%;animation:ldc-blob-morph-2 22s ease-in-out infinite alternate}
.ldc-hp-blob--about-2{width:350px;height:350px;bottom:-80px;right:-100px;background:radial-gradient(ellipse at 60% 50%,rgba(212,245,228,.08),transparent);border-radius:50% 50% 45% 55%/55% 45% 55% 45%;animation:ldc-blob-morph-1 18s ease-in-out infinite alternate}
.ldc-hp-blob--services-1{width:450px;height:450px;top:20%;right:-150px;background:radial-gradient(ellipse at 50% 50%,rgba(26,60,52,.04),transparent);border-radius:55% 45% 50% 50%/45% 55% 50% 50%;animation:ldc-blob-morph-3 20s ease-in-out infinite alternate}
.ldc-hp-blob--services-2{width:350px;height:350px;bottom:10%;left:-120px;background:radial-gradient(ellipse at 40% 60%,rgba(15,188,176,.05),transparent);border-radius:45% 55% 55% 45%/50% 50% 50% 50%;animation:ldc-blob-morph-2 26s ease-in-out infinite alternate}
.ldc-hp-blob--process-1{width:400px;height:400px;top:-60px;right:-100px;background:radial-gradient(ellipse at 50% 50%,rgba(15,188,176,.06),transparent);border-radius:50% 50% 40% 60%/60% 40% 60% 40%;animation:ldc-blob-morph-1 24s ease-in-out infinite alternate}
.ldc-hp-blob--process-2{width:300px;height:300px;bottom:-50px;left:-80px;background:radial-gradient(ellipse at 50% 50%,rgba(26,60,52,.04),transparent);border-radius:40% 60% 50% 50%/50% 40% 60% 50%;animation:ldc-blob-morph-3 20s ease-in-out infinite alternate}

/* Footer */
.ldc-hp-footer{background:var(--dark-deep);color:var(--text-on-dark-3);padding:var(--section-pad) var(--section-pad-x) 2rem}
.ldc-hp-footer-grid{max-width:var(--max-width);margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:2.5rem;margin-bottom:3rem}
.ldc-hp-footer h4{color:var(--text-on-dark-1);font-size:1rem;margin-bottom:1rem}
.ldc-hp-footer p,.ldc-hp-footer a{font-size:.9rem;color:var(--text-on-dark-4);line-height:1.8}
.ldc-hp-footer a:hover{color:var(--accent)}
.ldc-hp-footer-links{list-style:none}
.ldc-hp-footer-links li{margin-bottom:.5rem}
.ldc-hp-footer-bar{max-width:var(--max-width);margin:0 auto;padding-top:2rem;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;font-size:.85rem;color:var(--text-on-dark-4)}
.ldc-hp-footer-social{display:flex;gap:1rem}
.ldc-hp-footer-social a{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:var(--text-on-dark-3);transition:background .2s ease,color .2s ease}
.ldc-hp-footer-social a:hover{background:var(--accent);color:var(--white)}
@media(max-width:768px){.ldc-hp-footer-grid{grid-template-columns:1fr 1fr;gap:2rem}}
@media(max-width:480px){.ldc-hp-footer-grid{grid-template-columns:1fr}.ldc-hp-footer-bar{flex-direction:column;text-align:center}}

/* Scroll reveals */
.ldc-hp-reveal{opacity:0;transform:translateY(40px);transition:opacity var(--dur-reveal) var(--ease),transform var(--dur-reveal) var(--ease);will-change:opacity,transform}
.ldc-hp-reveal.revealed{opacity:1;transform:translateY(0)}
.ldc-hp-reveal-scale{opacity:0;transform:translateY(30px) scale(.96);transition:opacity var(--dur-reveal) var(--ease),transform var(--dur-reveal) var(--ease);will-change:opacity,transform}
.ldc-hp-reveal-scale.revealed{opacity:1;transform:translateY(0) scale(1)}
.ldc-hp-reveal-left{opacity:0;transform:translateX(-50px);transition:opacity var(--dur-reveal) var(--ease),transform var(--dur-reveal) var(--ease);will-change:opacity,transform}
.ldc-hp-reveal-left.revealed{opacity:1;transform:translateX(0)}
.ldc-hp-reveal-right{opacity:0;transform:translateX(50px);transition:opacity var(--dur-reveal) var(--ease),transform var(--dur-reveal) var(--ease);will-change:opacity,transform}
.ldc-hp-reveal-right.revealed{opacity:1;transform:translateX(0)}
.ldc-hp-reveal-stagger>*{opacity:0;transform:translateY(30px);transition:opacity .7s var(--ease),transform .7s var(--ease);will-change:opacity,transform}
.ldc-hp-reveal-stagger.revealed>*:nth-child(1){transition-delay:0s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(2){transition-delay:.1s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(3){transition-delay:.2s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(4){transition-delay:.3s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(5){transition-delay:.4s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(6){transition-delay:.5s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(7){transition-delay:.6s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(8){transition-delay:.7s}
.ldc-hp-reveal-stagger.revealed>*{opacity:1;transform:translateY(0)}

@keyframes ldc-hero-entrance{to{opacity:1;transform:translateY(0)}}
.ldc-hp-hero-team{opacity:0;transform:translateX(40px);animation:ldc-hero-team-entrance 1.4s var(--ease) .5s forwards}
@keyframes ldc-hero-team-entrance{to{opacity:1;transform:translateX(0)}}
@keyframes ldc-blob-drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-20px) scale(1.1)}}
@keyframes ldc-blob-morph-1{0%{border-radius:35% 65% 50% 50%/55% 40% 60% 45%;transform:translate(0,0) scale(1) rotate(0deg)}33%{border-radius:50% 50% 40% 60%/45% 55% 45% 55%}66%{border-radius:40% 60% 55% 45%/55% 45% 55% 45%}100%{border-radius:55% 45% 45% 55%/50% 50% 50% 50%;transform:translate(30px,-25px) scale(1.08) rotate(5deg)}}
@keyframes ldc-blob-morph-2{0%{border-radius:55% 45% 40% 60%/45% 55% 45% 55%;transform:translate(0,0) scale(1) rotate(0deg)}50%{border-radius:45% 55% 55% 45%/55% 45% 55% 45%}100%{border-radius:50% 50% 50% 50%/40% 60% 40% 60%;transform:translate(-20px,30px) scale(1.12) rotate(-4deg)}}
@keyframes ldc-blob-morph-3{0%{border-radius:60% 40% 55% 45%/50% 60% 40% 50%;transform:translate(0,0) scale(1)}100%{border-radius:45% 55% 40% 60%/60% 40% 60% 40%;transform:translate(15px,-20px) scale(1.06)}}

/* Hide Squarespace defaults */
body.homepage .page-section:not(.ldc-hp-injected),body.homepage .page-title{display:none!important}
</style>

<!-- ============================================================ ANIMATIONS ============================================================ -->
<script>
(function(){
  'use strict';
  if(window.__ldcHomepageAnimsMounted)return;
  window.__ldcHomepageAnimsMounted=true;

  function revealPage(){var r=document.querySelector('.ldc-hp');if(r)r.classList.add('ldc-hp-ready')}

  function initScrollReveal(){
    var els=document.querySelectorAll('.ldc-hp-reveal,.ldc-hp-reveal-scale,.ldc-hp-reveal-left,.ldc-hp-reveal-right,.ldc-hp-reveal-stagger');
    if(!els.length)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target)}})
    },{threshold:.12,rootMargin:'0px 0px -60px 0px'});
    els.forEach(function(el){obs.observe(el)});
  }

  function initBlobAnimations(){
    var heroBlobs=document.querySelectorAll('.ldc-hp-blob--hero-1,.ldc-hp-blob--hero-2,.ldc-hp-blob--hero-3');
    heroBlobs.forEach(function(blob,i){setTimeout(function(){blob.classList.add('blob-visible')},300+(i*200))});
    var scrollBlobs=document.querySelectorAll('.ldc-hp-blob:not([class*="hero"])');
    if(!scrollBlobs.length)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('blob-visible');obs.unobserve(e.target)}})
    },{threshold:.05,rootMargin:'100px 0px 0px 0px'});
    scrollBlobs.forEach(function(el){obs.observe(el)});
  }

  function initCardGrow(){
    var cards=document.querySelectorAll('.ldc-hp-service-card,.ldc-hp-step,.ldc-hp-team-card,.ldc-hp-review-card,.ldc-hp-trust-item,.ldc-hp-faq-item,.ldc-hp-flipcard');
    if(!cards.length)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          var parent=entry.target.parentElement;
          var siblings=parent?Array.prototype.slice.call(parent.children):[];
          var index=siblings.indexOf(entry.target);
          var delay=Math.min(index*100,600);
          setTimeout(function(){entry.target.classList.add('card-grown')},delay);
          obs.unobserve(entry.target);
        }
      })
    },{threshold:.08,rootMargin:'0px 0px -40px 0px'});
    cards.forEach(function(el){obs.observe(el)});
  }

  function initBlobParallax(){
    var blobs=document.querySelectorAll('.ldc-hp-blob');
    if(!blobs.length||window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
    var ticking=false;
    function onScroll(){
      if(!ticking){requestAnimationFrame(function(){
        var scrollY=window.pageYOffset;
        blobs.forEach(function(blob){
          var rect=blob.getBoundingClientRect();
          if(rect.top<window.innerHeight&&rect.bottom>0){
            var speed=blob.classList.contains('ldc-hp-blob--hero-1')?0.03:blob.classList.contains('ldc-hp-blob--hero-2')?-0.02:0.015;
            var y=scrollY*speed;
            blob.style.transform=blob.classList.contains('blob-visible')?'scale(1) translateY('+y+'px)':'';
          }
        });
        ticking=false;
      });ticking=true;}
    }
    window.addEventListener('scroll',onScroll,{passive:true});
  }

  function animateCounter(el){
    var target=parseFloat(el.getAttribute('data-count-to'));
    var prefix=el.getAttribute('data-count-prefix')||'';
    var suffix=el.getAttribute('data-count-suffix')||'';
    var dec=el.getAttribute('data-count-decimal')?parseInt(el.getAttribute('data-count-decimal'),10):0;
    var dur=2000,start=null;
    function step(ts){
      if(!start)start=ts;var p=Math.min((ts-start)/dur,1);var eased=1-Math.pow(1-p,3);var cur=eased*target;
      el.textContent=dec>0?prefix+cur.toFixed(dec)+suffix:prefix+Math.floor(cur).toLocaleString()+suffix;
      if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function initCounters(){
    var ctrs=document.querySelectorAll('[data-count-to]');if(!ctrs.length)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){animateCounter(e.target);obs.unobserve(e.target)}})
    },{threshold:.5});
    ctrs.forEach(function(el){obs.observe(el)});
  }

  function initFAQ(){
    var items=document.querySelectorAll('.ldc-hp-faq-item');if(!items.length)return;
    items.forEach(function(item){
      var btn=item.querySelector('.ldc-hp-faq-q');if(!btn)return;
      btn.addEventListener('click',function(){
        var isOpen=item.classList.contains('open');
        items.forEach(function(o){if(o!==item)o.classList.remove('open')});
        item.classList.toggle('open',!isOpen);
      });
    });
  }

  function initReviewCarousel(){
    var scroll=document.querySelector('.ldc-hp-reviews-scroll');
    var dots=document.querySelectorAll('.ldc-hp-review-dot');
    if(!scroll||!dots.length)return;
    var cards=scroll.querySelectorAll('.ldc-hp-review-card');
    dots.forEach(function(dot,i){dot.addEventListener('click',function(){if(cards[i])cards[i].scrollIntoView({behavior:'smooth',inline:'start',block:'nearest'})})});
    var t;
    scroll.addEventListener('scroll',function(){clearTimeout(t);t=setTimeout(function(){var w=cards[0]?cards[0].offsetWidth+20:340;var idx=Math.round(scroll.scrollLeft/w);dots.forEach(function(d,j){d.classList.toggle('active',j===idx)})},50)},{passive:true});
  }

  function initSmoothScroll(){
    document.querySelectorAll('.ldc-hp a[href^="#"]').forEach(function(link){
      link.addEventListener('click',function(e){var id=link.getAttribute('href');if(id==='#')return;var tgt=document.querySelector(id);if(tgt){e.preventDefault();tgt.scrollIntoView({behavior:'smooth',block:'start'})}});
    });
  }

  function init(){revealPage();initScrollReveal();initBlobAnimations();initCardGrow();initBlobParallax();initCounters();initFAQ();initReviewCarousel();initSmoothScroll()}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
