<style>
/* --- CSS Custom Properties (LDC Brand Palette) --- */
:root {
  --accent: #0fbcb0;
  --accent-hover: #0da399;
  --dark: #004443;
  --mid: #3c8481;
  --cream: #F8F1E7;
  --text: #20201F;
  --text-light: #555;
  --review-bg: #162B19;
  --white: #ffffff;
  --radius-card: 24px;
  --radius-pill: 50px;
  --radius-img: 20px;
  --shadow-card: 0 4px 24px rgba(0,0,0,0.07);
  --shadow-card-hover: 0 8px 32px rgba(0,0,0,0.12);
  --ease-flecto: cubic-bezier(.19,1,.22,1);
  --font: 'Cabin','DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --max-width: 1200px;
  --section-pad: clamp(3rem,6vw,6rem);
  --section-pad-x: clamp(1.25rem,4vw,3rem);
}

/* --- Reset & Base (scoped to .ldc-hp) --- */
.ldc-hp *,.ldc-hp *::before,.ldc-hp *::after{box-sizing:border-box;margin:0;padding:0}
.ldc-hp{font-family:var(--font);font-size:17px;line-height:1.6;color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden}
.ldc-hp h1,.ldc-hp h2,.ldc-hp h3,.ldc-hp h4{font-weight:600;letter-spacing:-0.02em;line-height:1.2}
.ldc-hp a{color:var(--accent);text-decoration:none;transition:color .2s ease}
.ldc-hp a:hover{color:var(--accent-hover)}
.ldc-hp img{max-width:100%;height:auto;display:block}

/* --- Skip Link --- */
.ldc-hp-skip{position:absolute;top:-100%;left:0;z-index:9999;padding:12px 24px;background:var(--accent);color:var(--white);font-weight:600;border-radius:0 0 var(--radius-card) 0}
.ldc-hp-skip:focus{top:0}

/* --- Section Container --- */
.ldc-hp-section{padding:var(--section-pad) var(--section-pad-x)}
.ldc-hp-inner{max-width:var(--max-width);margin:0 auto;width:100%}

/* --- Section Headings --- */
.ldc-hp-heading{font-size:clamp(1.75rem,3.5vw,2.75rem);color:var(--text);margin-bottom:1rem}
.ldc-hp-subheading{font-size:clamp(1rem,1.5vw,1.15rem);color:var(--text-light);font-weight:400;max-width:600px}
.ldc-hp-section-header{text-align:center;margin-bottom:clamp(2rem,4vw,3.5rem)}
.ldc-hp-section-header .ldc-hp-subheading{margin:0 auto}

/* --- HERO --- */
.ldc-hp-hero{position:relative;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0}
.ldc-hp-hero-bg{position:absolute;inset:0;z-index:0}
.ldc-hp-hero-bg img{width:100%;height:100%;object-fit:cover}
.ldc-hp-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,68,67,.55) 0%,rgba(0,68,67,.4) 50%,rgba(0,68,67,.65) 100%);z-index:1}
.ldc-hp-hero-content{position:relative;z-index:2;text-align:center;padding:2rem var(--section-pad-x);max-width:800px}
.ldc-hp-hero h1{font-size:clamp(2.5rem,5vw,4.5rem);color:var(--white);margin-bottom:1rem;letter-spacing:-0.03em}
.ldc-hp-hero h2{font-size:clamp(1rem,2vw,1.35rem);color:rgba(255,255,255,.9);font-weight:400;margin-bottom:2rem;line-height:1.5}
.ldc-hp-hero-ctas{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}

/* --- Review Pill Card (Hero) --- */
.ldc-hp-review-pill{display:inline-flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.25);border-radius:var(--radius-pill);padding:.5rem 1.25rem;color:var(--white);font-size:.9rem;font-weight:500}
.ldc-hp-review-pill .stars{color:#fbbf24;font-size:1rem;letter-spacing:1px}
.ldc-hp-review-pill .rating{font-weight:600}

/* --- Wave Divider --- */
.ldc-hp-wave{position:absolute;bottom:-1px;left:0;width:100%;z-index:3;line-height:0}
.ldc-hp-wave svg{display:block;width:100%;height:auto}
.ldc-hp-wave--cream svg path{fill:var(--cream)}
.ldc-hp-wave--white svg path{fill:var(--white)}
.ldc-hp-wave--dark svg path{fill:var(--dark)}
.ldc-hp-wave--up{transform:rotate(180deg)}

.ldc-hp-btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.85rem 2rem;border-radius:var(--radius-pill);font-family:var(--font);font-size:1rem;font-weight:600;text-decoration:none;cursor:pointer;border:2px solid transparent;transition:transform .3s var(--ease-flecto),box-shadow .3s ease,background .2s ease}

.ldc-hp-btn-primary{background:var(--accent);color:var(--white);border-color:var(--accent)}

.ldc-hp-btn-outline{background:transparent;color:var(--white);border-color:rgba(255,255,255,.5)}

/* --- ABOUT --- */

/* --- SERVICES GRID --- */
.ldc-hp-services{background:var(--cream);position:relative}
.ldc-hp-services-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem}
.ldc-hp-service-card{background:var(--white);border-radius:var(--radius-card);overflow:hidden;box-shadow:var(--shadow-card);transition:transform .4s var(--ease-flecto),box-shadow .4s ease;text-decoration:none;color:var(--text);display:flex;flex-direction:column}
.ldc-hp-service-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-card-hover);color:var(--text)}
.ldc-hp-service-card-img{aspect-ratio:4/3;overflow:hidden}
.ldc-hp-service-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease-flecto)}
.ldc-hp-service-card:hover .ldc-hp-service-card-img img{transform:scale(1.05)}
.ldc-hp-service-card-body{padding:1.25rem;flex:1;display:flex;flex-direction:column}
.ldc-hp-service-card h3{font-size:1.05rem;margin-bottom:.5rem}
.ldc-hp-service-card p{font-size:.875rem;color:var(--text-light);flex:1}
.ldc-hp-service-card .ldc-hp-card-link{display:inline-flex;align-items:center;gap:.3rem;font-size:.875rem;font-weight:600;color:var(--accent);margin-top:.75rem;transition:gap .2s ease}
.ldc-hp-service-card:hover .ldc-hp-card-link{gap:.5rem}
@media(max-width:1024px){.ldc-hp-services-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.ldc-hp-services-grid{grid-template-columns:repeat(2,1fr);gap:1rem}}

/* --- 3-STEP PROCESS --- */
.ldc-hp-process{background:var(--white)}
.ldc-hp-process-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;position:relative}
.ldc-hp-process-steps::before{content:'';position:absolute;top:32px;left:15%;right:15%;height:2px;background:var(--accent);opacity:.3;border-radius:1px}
.ldc-hp-step{text-align:center;position:relative}
.ldc-hp-step-number{width:64px;height:64px;border-radius:50%;background:var(--accent);color:var(--white);font-size:1.5rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;position:relative;z-index:1}
.ldc-hp-step h3{font-size:1.15rem;margin-bottom:.5rem}

  .ldc-hp-step{text-align:left;padding-left:88px}

}

/* --- TEAM --- */
.ldc-hp-team{background:var(--cream)}
.ldc-hp-team-scroll{display:flex;gap:1.25rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:1rem;scrollbar-width:thin;scrollbar-color:var(--accent) transparent}

.ldc-hp-reviews{background:var(--dark);position:relative}

.ldc-hp-footer-social{display:flex;gap:1rem}
.ldc-hp-footer-social a{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;transition:background .2s ease}
.ldc-hp-footer-social a:hover{background:var(--accent)}
@media(max-width:768px){.ldc-hp-footer-grid{grid-template-columns:1fr 1fr;gap:2rem}}
@media(max-width:480px){.ldc-hp-footer-grid{grid-template-columns:1fr}.ldc-hp-footer-bar{flex-direction:column;text-align:center}}

/* --- SCROLL REVEAL --- */
.ldc-hp-reveal{opacity:0;transform:translateY(24px);transition:opacity .7s var(--ease-flecto),transform .7s var(--ease-flecto)}
.ldc-hp-reveal.revealed{opacity:1;transform:translateY(0)}
.ldc-hp-reveal-stagger>*{opacity:0;transform:translateY(20px);transition:opacity .5s var(--ease-flecto),transform .5s var(--ease-flecto)}
.ldc-hp-reveal-stagger.revealed>*:nth-child(1){transition-delay:0s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(2){transition-delay:.08s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(3){transition-delay:.16s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(4){transition-delay:.24s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(5){transition-delay:.32s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(6){transition-delay:.40s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(7){transition-delay:.48s}
.ldc-hp-reveal-stagger.revealed>*:nth-child(8){transition-delay:.56s}
.ldc-hp-reveal-stagger.revealed>*{opacity:1;transform:translateY(0)}

/* --- ANIMATIONS --- */
@keyframes ldc-blob-drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-20px) scale(1.08)}}

/* --- FINANCE BANNER --- */
.ldc-hp-finance-banner{background:var(--accent);color:var(--white);text-align:center;padding:.75rem 1rem;font-size:.95rem;font-weight:500}
.ldc-hp-finance-banner a{color:var(--white);text-decoration:underline;font-weight:600}

/* --- Hide Squarespace default homepage content --- */
body.homepage .page-section:not(.ldc-hp-injected),
body.homepage .page-title{display:none!important}
</style>

<!-- ============================================================
     ANIMATIONS (inline script)
     ============================================================ -->
<script>
(function(){
  'use strict';
  if(window.__ldcHomepageAnimsMounted)return;
  window.__ldcHomepageAnimsMounted=true;

  function initScrollReveal(){
    var els=document.querySelectorAll('.ldc-hp-reveal,.ldc-hp-reveal-stagger');
    if(!els.length)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target)}})
    },{threshold:.15,rootMargin:'0px 0px -40px 0px'});
    els.forEach(function(el){obs.observe(el)});
  }

  function animateCounter(el){
    var target=parseFloat(el.getAttribute('data-count-to'));
    var prefix=el.getAttribute('data-count-prefix')||'';
    var suffix=el.getAttribute('data-count-suffix')||'';
    var dec=el.getAttribute('data-count-decimal')?parseInt(el.getAttribute('data-count-decimal'),10):0;
    var dur=1800,start=null;
    function step(ts){
      if(!start)start=ts;
      var p=Math.min((ts-start)/dur,1);
      var eased=1-Math.pow(1-p,3);
      var cur=eased*target;
      el.textContent=dec>0?prefix+cur.toFixed(dec)+suffix:prefix+Math.floor(cur).toLocaleString()+suffix;
      if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function initCounters(){
    var ctrs=document.querySelectorAll('[data-count-to]');
    if(!ctrs.length)return;
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){animateCounter(e.target);obs.unobserve(e.target)}})
    },{threshold:.5});
    ctrs.forEach(function(el){obs.observe(el)});
  }

  function initFAQ(){
    var items=document.querySelectorAll('.ldc-hp-faq-item');
    if(!items.length)return;
    items.forEach(function(item){
      var btn=item.querySelector('.ldc-hp-faq-q');
      if(!btn)return;
      btn.addEventListener('click',function(){
        var isOpen=item.classList.contains('open');
        items.forEach(function(o){if(o!==item)o.classList.remove('open')});
        item.classList.toggle('open',!isOpen);
      });
    });
  }

  function initReviewCarousel(){
    var scroll=document.querySelector('.ldc-hp-reviews-scroll');
    var dots=document.querySelectorAll('.ldc-hp-review-dot');
    if(!scroll||!dots.length)return;
    var cards=scroll.querySelectorAll('.ldc-hp-review-card');
    dots.forEach(function(dot,i){
      dot.addEventListener('click',function(){if(cards[i])cards[i].scrollIntoView({behavior:'smooth',inline:'start',block:'nearest'})});
    });
    var t;
    scroll.addEventListener('scroll',function(){
      clearTimeout(t);
      t=setTimeout(function(){
        var w=cards[0]?cards[0].offsetWidth+20:340;
        var idx=Math.round(scroll.scrollLeft/w);
        dots.forEach(function(d,j){d.classList.toggle('active',j===idx)});
      },50);
    },{passive:true});
  }

  function initSmoothScroll(){
    document.querySelectorAll('.ldc-hp a[href^="#"]').forEach(function(link){
      link.addEventListener('click',function(e){
        var id=link.getAttribute('href');if(id==='#')return;
        var tgt=document.querySelector(id);
        if(tgt){e.preventDefault();tgt.scrollIntoView({behavior:'smooth',block:'start'})}
      });
    });
  }

  function init(){initScrollReveal();initCounters();initFAQ();initReviewCarousel();initSmoothScroll()}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
