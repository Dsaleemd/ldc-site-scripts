<style>
/* ====== TOP REVIEW BAR ====== */
.google-review-bar {
  width: 100%;
  background: #162B19;
  color: #ffffff;
  font-family: inherit;
  font-size: 13px;
}

.google-review-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-align: center;
  white-space: nowrap;
}

.google-review-text { opacity: 0.95; }
.google-review-rating { opacity: 0.9; }

.google-review-stars {
  display: flex;
  gap: 3px;
  align-items: center;
}

.google-review-stars svg {
  width: 14px;
  height: 14px;
  fill: #f5b301;
  display: block;
}

.google-review-link {
  color: #00b67a;
  text-decoration: none;
  font-weight: 600;
}

.google-review-link:hover { text-decoration: underline; }

@media (max-width: 520px) {
  .google-review-rating { display: none; }
}

/* Header positioning */
#page, .Main, .Site-content, .site-wrapper, .main-content, #siteWrapper, #content {
  padding-top: 0 !important;
  margin-top: 0 !important;
}

.header-spacer, .Header-spacer, .Header-headerSpacer, .Header--spacer, [data-header-spacer] {
  height: 0 !important;
  margin: 0 !important;
  padding: 0 !important;
  display: none !important;
}

main > section:first-child, .Main-content > section:first-child, #page > section:first-child {
  margin-top: 0 !important;
  padding-top: 0 !important;
}

/* ====== MEGA MENU STYLES ====== */
:root {
  --mega-bg: #ffffff;
  --mega-shadow: 0 20px 50px rgba(0,0,0,0.15);
  --mega-padding: 28px;
  --mega-bridge-height: 52px;
  --mega-close-delay-ms: 140;
}

.header-mega-overlay {
  position: fixed;
  left: 0;
  right: 0;
  top: var(--mega-overlay-top, 0px);
  height: calc(100vh - var(--mega-overlay-top, 0px));
  background: rgba(0,0,0,0.18);
  z-index: 999996;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 0.18s ease, visibility 0.18s ease;
}

.header-mega-overlay.is-open {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}

.header-mega-bridge {
  position: fixed;
  left: 0;
  right: 0;
  top: var(--mega-bridge-top, 88px);
  height: var(--mega-bridge-height);
  background: transparent;
  z-index: 999997;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.header-mega-bridge.is-open {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}

.header-mega-tray {
  position: fixed;
  left: 0;
  right: 0;
  top: var(--mega-top-offset, 140px);
  width: 100vw;
  background: var(--mega-bg);
  box-shadow: var(--mega-shadow);
  padding: var(--mega-padding);
  z-index: 999998;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transform: translateY(-6px);
  transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
  will-change: transform, opacity;
}

.header-mega-tray.is-open {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  transform: translateY(0);
}

.header-mega-inner {
  width: min(1200px, calc(100vw - 24px));
  margin: 0 auto;
}

.header-mega-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}

.header-mega-item {
  text-decoration: none;
  color: #000;
}

.header-mega-item img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
  border-radius: 6px;
  loading: lazy;
}

.header-mega-item span {
  display: block;
  text-align: center;
  margin-top: 8px;
  font-size: 12px;
  letter-spacing: 0.5px;
}

.header-mega-item:hover span {
  text-decoration: underline;
}

@media (max-width: 900px) {
  .header-mega-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  .header-mega-item img {
    height: 120px;
  }
}

/* ====== HIDE MOBILE/DESKTOP NAV ITEMS ====== */
@media (min-width: 901px) {
  header a[href*="/treatments-1"] {
    display: none !important;
  }
}

@media (max-width: 900px) {
  header a[href*="/mega-concerns"] {
    display: none !important;
  }
}

/* IMAGE OPTIMIZATION */
img {
  max-width: 100%;
  height: auto;
}

.sqs-block-image img {
  object-fit: cover;
  image-rendering: -webkit-optimize-contrast;
}

img[src*="YJ61+L1w.jpeg"] {

}
